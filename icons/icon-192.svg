<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Outer dark border -->
  <rect width="192" height="192" rx="36" fill="#2C3E50"/>
  <!-- Mustard fill -->
  <rect x="6" y="6" width="180" height="180" rx="30" fill="#D4A017"/>
  <!-- Inner decorative ring -->
  <rect x="16" y="16" width="160" height="160" rx="22"
        fill="none" stroke="#2C3E50" stroke-width="3"/>
  <!-- Corner stars -->
  <text x="22" y="38" font-family="serif" font-size="14" fill="#2C3E50">★</text>
  <text x="154" y="38" font-family="serif" font-size="14" fill="#2C3E50">★</text>
  <text x="22" y="178" font-family="serif" font-size="14" fill="#2C3E50">★</text>
  <text x="154" y="178" font-family="serif" font-size="14" fill="#2C3E50">★</text>
  <!-- Monogram -->
  <text x="96" y="124" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="76" fill="#2C3E50">AB</text>
  <!-- Bottom label -->
  <text x="96" y="163" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="600" letter-spacing="3"
        fill="#2C3E50">BUDDIES</text>
</svg>
