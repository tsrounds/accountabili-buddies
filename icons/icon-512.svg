<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer dark border -->
  <rect width="512" height="512" rx="96" fill="#2C3E50"/>
  <!-- Mustard fill -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="#D4A017"/>
  <!-- Inner decorative ring -->
  <rect x="42" y="42" width="428" height="428" rx="58"
        fill="none" stroke="#2C3E50" stroke-width="8"/>
  <!-- Corner stars -->
  <text x="58" y="100" font-family="serif" font-size="38" fill="#2C3E50">★</text>
  <text x="408" y="100" font-family="serif" font-size="38" fill="#2C3E50">★</text>
  <text x="58" y="476" font-family="serif" font-size="38" fill="#2C3E50">★</text>
  <text x="408" y="476" font-family="serif" font-size="38" fill="#2C3E50">★</text>
  <!-- Monogram -->
  <text x="256" y="330" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="202" fill="#2C3E50">AB</text>
  <!-- Bottom label -->
  <text x="256" y="434" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="600" letter-spacing="8"
        fill="#2C3E50">BUDDIES</text>
</svg>
